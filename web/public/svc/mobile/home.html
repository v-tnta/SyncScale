<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/svc/mobile/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SyncScale">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SyncScale</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    function checkAndRedirect() {
      // PC表示（幅が768px超）かつモバイル用URLにいる場合、PC版（/）へリダイレクトする
      const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
      if (!isMobile) {
        window.location.href = '/';
      }
    }
    // 初回とリサイズ時の監視
    checkAndRedirect();
    window.addEventListener('resize', checkAndRedirect);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
